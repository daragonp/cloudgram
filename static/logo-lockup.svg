<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 200" role="img" aria-label="CloudGram">
  <title>CloudGram</title>
  <defs>
    <linearGradient id="cgl-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#0A84FF"/>
      <stop offset="100%" stop-color="#BF5AF2"/>
    </linearGradient>
    <linearGradient id="cgl-highlight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="55%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="cgl-glow" cx="50%" cy="35%" r="65%">
      <stop offset="0%"  stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#ffffff" stop-opacity="0"/>
