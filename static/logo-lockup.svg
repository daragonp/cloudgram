        C 17 8, 8 17, 8 28
        C 8 29, 8.1 30, 8.4 31
        C 3.6 33, 0 38, 0 44
        C 0 51.2, 6 57, 13.2 57
        L 89 57
        C 97.2 57, 104 50.3, 104 42
        C 104 34.6, 98.5 28.5, 91.3 27.5
        C 90.6 16.2, 81.2 8, 69.8 8
        C 64.1 8, 59 10.3, 55.3 13.9
        C 51.7 10.3, 46.7 8, 41.3 8
        Z" opacity="0.96"/>
    </g>
