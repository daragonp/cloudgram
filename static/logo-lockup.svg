    <rect x="0" y="0" width="160" height="160" rx="38" ry="38" fill="url(#cgl-glow)"/>
    <rect x="0" y="0" width="160" height="160" rx="38" ry="38" fill="url(#cgl-highlight)"/>
    <rect x="0.5" y="0.5" width="159" height="159" rx="37.5" ry="37.5"
