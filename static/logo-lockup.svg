    <linearGradient id="cgl-stroke" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#ffffff" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.20"/>
    </linearGradient>
  </defs>

  <!-- Icono squircle -->
  <g transform="translate(20, 20)">
