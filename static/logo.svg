<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="CloudGram">
  <title>CloudGram</title>
  <defs>
    <!-- Gradiente principal Apple Blue → Apple Purple (135°) -->
    <linearGradient id="cg-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#0A84FF"/>
      <stop offset="100%" stop-color="#BF5AF2"/>
    </linearGradient>

    <!-- Highlight superior sutil (sensación 3D) -->
    <linearGradient id="cg-highlight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="55%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <!-- Resplandor interior (depth) -->
    <radialGradient id="cg-glow" cx="50%" cy="35%" r="65%">
      <stop offset="0%"  stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <!-- Sombra suave interior (borde inferior más oscuro, look squircle iOS) -->
    <linearGradient id="cg-stroke" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#ffffff" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.20"/>
    </linearGradient>
  </defs>

  <!-- Squircle base con gradiente -->
  <rect x="8" y="8" width="240" height="240" rx="58" ry="58" fill="url(#cg-grad)"/>

  <!-- Capas de luz para profundidad -->
  <rect x="8" y="8" width="240" height="240" rx="58" ry="58" fill="url(#cg-glow)"/>
  <rect x="8" y="8" width="240" height="240" rx="58" ry="58" fill="url(#cg-highlight)"/>

  <!-- Borde fino con gradiente vertical (top brillante / bottom sombra) -->
  <rect x="8.5" y="8.5" width="239" height="239" rx="57.5" ry="57.5"
        fill="none" stroke="url(#cg-stroke)" stroke-width="1"/>

  <!-- Nube en blanco, centrada y con leve sombra de elevación -->
  <g transform="translate(48, 70)" fill="#FFFFFF">
    <!-- Sombra muy sutil debajo de la nube -->
    <ellipse cx="80" cy="120" rx="64" ry="6" fill="#000000" opacity="0.12"/>

    <!-- Path principal de nube (SF Symbols-like, suavizada) -->
    <path d="
      M44 12
      C 26 12, 12 26, 12 44
      C 12 46, 12.2 48, 12.6 50
      C 5.4 53, 0 60, 0 68.5
      C 0 79.8, 9.2 89, 20.5 89
      L 138 89
      C 150.7 89, 161 78.7, 161 66
      C 161 54.5, 152.5 45, 141.4 43.4
      C 140.3 26, 125.7 12, 108 12
      C 99.3 12, 91.4 15.5, 85.6 21
      C 80 15.5, 72.5 12, 64 12
      Z" opacity="0.95"/>

    <!-- Glow superior dentro de la nube para hacerla más viva -->
    <path d="
      M44 12
      C 26 12, 12 26, 12 44
      C 12 46, 12.2 48, 12.6 50
      C 5.4 53, 0 60, 0 68.5
      L 0 64
      C 0 56, 5 49, 12 46
      C 12.5 30, 26 18, 44 18
      C 56 18, 67 24, 73 33
      C 79 26, 90 21, 102 21
      C 121 21, 136 35, 137 53
      C 144 56, 149 62, 151 69
      L 151 66
      C 151 56, 144 47, 134 44
      C 133 27, 119 13, 102 13
      C 91 13, 81 19, 75 28
      C 69 19, 58 13, 47 13
      Z" fill="#FFFFFF" opacity="0.35"/>
  </g>
</svg>
