{% extends 'base.html' %}

{% block content %}
<div class="page-header">
    <h1>Ajustes de perfil</h1>
    <p>Gestiona tus credenciales de administrador</p>
</div>

<div class="row">
    <div class="col-lg-8 col-xl-7">
        <div class="glass-panel p-4 p-md-5">
            <form action="{{ url_for('perfil') }}" method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                <div class="row g-4 mb-4">
                    <div class="col-md-6">
                        <label class="form-label" for="profileName">Nombre del administrador</label>
                        <input id="profileName" type="text" name="nombre" class="form-control"
                               value="{{ user.nombre or '' }}" placeholder="Ej. Pedro Ramírez">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label" for="profileEmail">Correo (no editable)</label>
                        <input id="profileEmail" type="email" class="form-control" value="{{ user.email }}"
                               readonly style="cursor: not-allowed; opacity: 0.6;">
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label" for="newPassword">Nueva contraseña</label>
                    <div class="input-group">
                        <span class="input-group-text border-end-0">
                            <i class="bi bi-key"></i>
                        </span>
                        <input id="newPassword" type="password" name="new_password" class="form-control"
                               placeholder="Mínimo 6 caracteres" autocomplete="new-password">
                        <button class="btn btn-soft" type="button" id="togglePassword" aria-label="Mostrar contraseña">
                            <i class="bi bi-eye"></i>
                        </button>
                    </div>
                    <small class="d-inline-block mt-2" style="color: var(--text-tertiary); font-size: 0.82rem;">
                        <i class="bi bi-info-circle me-1"></i>
                        Deja este campo vacío si no deseas cambiar tu contraseña actual.
                    </small>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-accent px-4">
                        Guardar cambios
                    </button>
                    <a href="{{ url_for('dashboard') }}" class="btn btn-soft px-4">
                        Cancelar
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const toggleBtn = document.getElementById('togglePassword');
        const pwdInput = document.getElementById('newPassword');
        if (toggleBtn && pwdInput) {
            toggleBtn.addEventListener('click', function() {
                const isHidden = pwdInput.getAttribute('type') === 'password';
                pwdInput.setAttribute('type', isHidden ? 'text' : 'password');
                toggleBtn.innerHTML = isHidden
                    ? '<i class="bi bi-eye-slash"></i>'
                    : '<i class="bi bi-eye"></i>';
            });
        }
    });
</script>
{% endblock %}
