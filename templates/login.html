{% extends 'base.html' %}

{% block guest_content %}
<div class="auth-card">
    <div class="auth-brand">
        <img src="{{ url_for('static', filename='logo.svg') }}"
             alt="CloudGram" width="40" height="40"
             style="border-radius: 12px; box-shadow: 0 0 0 1px rgba(255,255,255,0.06) inset;">
        <span class="brand-name">CloudGram</span>
    </div>

    <h1 class="auth-title">Bienvenido de vuelta</h1>
    <p class="auth-subtitle">Inicia sesión para acceder a tu panel</p>

    <form method="POST" novalidate>
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <div class="mb-3">
            <label class="form-label" for="loginEmail">Correo electrónico</label>
            <input id="loginEmail" type="email" name="email" class="form-control"
                   placeholder="tu@email.com" required autocomplete="email" autofocus>
        </div>

        <div class="mb-4">
            <label class="form-label" for="loginPassword">Contraseña</label>
            <input id="loginPassword" type="password" name="password" class="form-control"
                   placeholder="••••••••" required autocomplete="current-password">
        </div>

        <button type="submit" class="btn btn-accent w-100 py-2">
            Entrar
            <i class="bi bi-arrow-right ms-1"></i>
        </button>
    </form>

    <div class="text-center mt-4">
        <small style="color: var(--text-tertiary); font-size: 0.78rem;">
            © 2026 CloudGram · Panel de administración
        </small>
    </div>
</div>
{% endblock %}
