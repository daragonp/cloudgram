{% extends 'base.html' %}

{% block guest_content %}
<div class="row justify-content-center align-items-center w-100 m-0">
    <div class="col-md-6 col-lg-4">
        <div class="glass-panel p-5 position-relative overflow-hidden mb-5">
            <!-- Decorative blur blob -->
            <div class="position-absolute top-0 start-0 w-100 h-100" style="background: radial-gradient(circle at top right, rgba(0, 229, 255, 0.1), transparent 50%); z-index: 0; pointer-events: none;"></div>
            
            <div class="position-relative z-1 text-center mb-4">
                <h3 class="fw-bold text-white mb-2">Acceso Administrativo</h3>
                <p class="text-muted small">Ingresa tus credenciales para continuar</p>
            </div>
            
            <form method="POST" class="position-relative z-1">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                <div class="mb-4">
                    <label class="form-label text-white-50 small fw-bold text-uppercase" style="letter-spacing: 1px;">Correo electrónico</label>
                    <div class="input-group">
                        <span class="input-group-text bg-dark border-secondary text-muted border-end-0"><i class="bi bi-envelope"></i></span>
                        <input type="email" name="email" class="form-control border-start-0 ps-0" placeholder="admin@cloudgram.com" required style="background: rgba(255,255,255,0.02) !important; color: white;">
                    </div>
                </div>
                
                <div class="mb-5">
                    <label class="form-label text-white-50 small fw-bold text-uppercase" style="letter-spacing: 1px;">Contraseña</label>
                    <div class="input-group">
                        <span class="input-group-text bg-dark border-secondary text-muted border-end-0"><i class="bi bi-lock"></i></span>
                        <input type="password" name="password" class="form-control border-start-0 ps-0" placeholder="••••••••" required style="background: rgba(255,255,255,0.02) !important; color: white;">
                    </div>
                </div>

                <button type="submit" class="btn btn-accent w-100 py-3 fw-bold rounded-3 text-dark">
                    Entrar al Sistema <i class="bi bi-arrow-right ms-2"></i>
                </button>
            </form>
            
            <div class="text-center mt-5 position-relative z-1">
                <small class="text-muted" style="font-size: 0.75rem;">&copy; 2026 CloudGram PRO - Administrador</small>
            </div>
        </div>
    </div>
</div>
{% endblock %}
